<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Wheel: Foghorn Edition</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #wheel-container { position: relative; width: 75vw; height: 75vw; max-width: 280px; transition: opacity 0.5s; }
        canvas { width: 100%; height: 100%; border: 4px solid #fff; border-radius: 50%; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        #pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ff3e00; z-index: 10; }
        #status-bar { font-size: 1rem; color: #ff3e00; margin-bottom: 5px; font-weight: bold; }
        #result-display { margin-top: 20px; height: 100px; text-align: center; font-size: 2.2rem; font-weight: 900; color: #fff; text-transform: uppercase; padding: 0 10px; display: flex; align-items: center; justify-content: center; line-height: 1.1; }
        .flash { animation: neon-flash 0.5s infinite alternate; }
        @keyframes neon-flash { from { color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #ff3e00; } to { color: #ff3e00; text-shadow: 0 0 20px #ff3e00, 0 0 30px #ff0000; } }
        #timer-display { font-size: 5rem; color: #ff3e00; display: none; font-weight: 900; }
        button { background: #fff; color: #000; border: none; padding: 18px 40px; font-size: 1.2rem; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 10px; z-index: 20; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="status-bar">MULTIPLIER: 1X</div>
    <div id="pointer"></div>
    <div id="wheel-container"><canvas id="wheel"></canvas></div>
    <div id="timer-display">60s</div>
    <div id="result-display">READY</div>
    <div id="controls">
        <button id="spin-btn">SPIN</button>
        <button id="timer-btn" class="hidden">START TIMER</button>
    </div>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spin-btn');
    const timerBtn = document.getElementById('timer-btn');
    const resultDisplay = document.getElementById('result-display');
    const timerDisplay = document.getElementById('timer-display');
    const wheelContainer = document.getElementById('wheel-container');
    const statusDisplay = document.getElementById('status-bar');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTick() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // THE FOGHORN ALARM
    function playFoghorn() {
        const now = audioCtx.currentTime;
        const duration = 2.5;
        
        // Create two oscillators for a thick, dissonant "industrial" sound
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(55, now); // Low G
        
        osc2.type = 'sawtooth';
        osc2.frequency.setValueAtTime(57, now); // Slightly detuned for "roar"

        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.5, now + 0.2); // Quick fade in
        gain.gain.linearRampToValueAtTime(0.4, now + duration - 0.5); // Sustained blast
        gain.gain.linearRampToValueAtTime(0, now + duration); // Fade out

        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioCtx.destination);

        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + duration);
        osc2.stop(now + duration);
    }

    const actions = [
        { text: "Remove 1 Clothing", type: "item", val: 1 },
        { text: "Remove 1 Clothing", type: "item", val: 1 },
        { text: "Remove 1 Clothing", type: "item", val: 1 },
        { text: "Remove 1 of HIS", type: "item", val: 1 },
        { text: "Kiss", type: "time", val: 60 },
        { text: "Nipple Play", type: "time", val: 60 },
        { text: "Suck", type: "time", val: 60 },
        { text: "Rim", type: "time", val: 60 },
        { text: "Finger", type: "time", val: 60 },
        { text: "DOUBLE UP", type: "special", val: 0 }
    ];

    let currentRotation = 0;
    let multiplier = 1;
    let timerInterval;
    let currentTargetSeconds = 60;

    function drawWheel() {
        canvas.width = 800; canvas.height = 800;
        const slice = (Math.PI * 2) / actions.length;
        actions.forEach((act, i) => {
            const angle = i * slice;
            ctx.beginPath();
            ctx.fillStyle = (i % 2 === 0) ? '#111' : '#222';
            if(act.type === 'special') ctx.fillStyle = '#440000';
            ctx.moveTo(400, 400); ctx.arc(400, 400, 400, angle, angle + slice); ctx.fill();
            ctx.strokeStyle = "#555"; ctx.lineWidth = 2; ctx.stroke();
            ctx.save();
            ctx.translate(400, 400); ctx.rotate(angle + slice / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "#fff";
            ctx.font = "bold 26px monospace";
            ctx.fillText(act.text, 380, 10); ctx.restore();
        });
    }

    spinBtn.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        resultDisplay.classList.remove('flash');
        const spinAdd = Math.floor(Math.random() * 360) + 3600; 
        currentRotation += spinAdd;
        canvas.style.transform = `rotate(${currentRotation}deg)`;
        resultDisplay.innerText = "SPINNING...";
        spinBtn.classList.add('hidden');

        let ticks = 0;
        const tickInterval = setInterval(() => {
            playTick();
            ticks++;
            if(ticks > 30) clearInterval(tickInterval);
        }, 140);

        setTimeout(() => {
            const actualDegree = currentRotation % 360;
            const index = Math.floor((360 - (actualDegree % 360)) / (360 / actions.length)) % actions.length;
            const result = actions[index];
            resultDisplay.classList.add('flash');

            if (result.type === "special") {
                multiplier *= 2;
                statusDisplay.innerText = `MULTIPLIER: ${multiplier}X`;
                resultDisplay.innerText = "DOUBLE UP!";
                setTimeout(() => spinBtn.classList.remove('hidden'), 1000);
            } else {
                if (result.type === "item") {
                    const count = result.val * multiplier;
                    resultDisplay.innerText = result.text.replace('1', count);
                    spinBtn.classList.remove('hidden');
                    multiplier = 1; 
                } else if (result.type === "time") {
                    currentTargetSeconds = result.val * multiplier;
                    resultDisplay.innerText = `${result.text} ${currentTargetSeconds/60}m`;
                    timerBtn.innerText = `START TIMER`;
                    timerBtn.classList.remove('hidden');
                }
            }
        }, 5000);
    });

    timerBtn.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        resultDisplay.classList.remove('flash');
        timerBtn.classList.add('hidden');
        wheelContainer.style.opacity = "0.1";
        resultDisplay.style.display = "none";
        timerDisplay.style.display = "block";
        startCountdown(currentTargetSeconds);
    });

    function startCountdown(seconds) {
        let timeLeft = seconds;
        timerDisplay.innerText = timeLeft + "s";
        timerInterval = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft + "s";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                playFoghorn(); // THE BLAST
                timerDisplay.innerText = "TIME'S UP";
                setTimeout(() => {
                    multiplier = 1;
                    statusDisplay.innerText = `MULTIPLIER: 1X`;
                    resetUI();
                }, 4000);
            }
        }, 1000);
    }

    function resetUI() {
        timerDisplay.style.display = "none";
        wheelContainer.style.opacity = "1";
        resultDisplay.style.display = "flex";
        spinBtn.classList.remove('hidden');
        resultDisplay.innerText = "READY";
    }

    drawWheel();
</script>
</body>
</html>
